name: LifeLog CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      statuses: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Validate version
      run: |
        VERSION=$(grep '"version"' package.json | sed 's/.*"version": "//;s/".*//')
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "❌ Versão inválida: $VERSION (deve ser semver major.minor.patch)"
          exit 1
        fi
        echo "✅ Versão validada: v$VERSION"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Enable pnpm via corepack
      run: |
        corepack enable
        corepack prepare pnpm@9 --activate
        mkdir -p /tmp/pnpm-store
        pnpm config set store-dir /tmp/pnpm-store --global
        echo "PNPM_HOME=/tmp/pnpm-home" >> $GITHUB_ENV

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Astro type check (lint)
      continue-on-error: true
      run: pnpm astro check

    - name: Run E2E tests
      continue-on-error: true
      run: |
        npx playwright install chromium --with-deps
        pnpm exec playwright test --reporter=list --workers=2 || true

    - name: Build project
      run: pnpm build

    - name: Deploy to Vercel
      if: github.ref_name == 'main' && github.event_name != 'pull_request'
      run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1

    - name: Health Check
      if: github.ref_name == 'main' && github.event_name != 'pull_request'
      run: |
        sleep 15
        for i in $(seq 1 3); do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://lifelog-sepia.vercel.app 2>/dev/null)
          [ "$CODE" = "200" ] && echo "✅ Online (HTTP $CODE)" && exit 0
          echo "Tentativa $i: $CODE"
          sleep 5
        done
        echo "❌ Site offline" && exit 1

    - name: Notify Telegram Success
      if: github.ref_name == 'main' && github.event_name != 'pull_request' && success()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ *LifeLog CI*%0A%0A📦 *Status:* Sucesso%0A🔗 *URL:* https://lifelog-sepia.vercel.app%0A📝 *Commit:* \`$(git rev-parse --short HEAD)\`" \
          -d "parse_mode=Markdown"

    - name: Notify Telegram Failure
      if: github.ref_name == 'main' && github.event_name != 'pull_request' && failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ *LifeLog CI Falhou*%0A%0A📝 *Commit:* \`$(git rev-parse --short HEAD)\`%0A🔍 *Log:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -d "parse_mode=Markdown"
