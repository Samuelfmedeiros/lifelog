name: LifeLog CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Só um deploy por vez — evita concorrência entre workflows duplicados
concurrency:
  group: lifelog-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      statuses: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    # ── Validação ──────────────────────────────────────────────
    - name: Validate project
      run: |
        echo "🔍 Verificando estrutura do projeto..."
        if [ ! -f "package.json" ]; then
          echo "❌ package.json não encontrado"
          exit 1
        fi
        NAME=$(grep '"name"' package.json | sed 's/.*"name": "//;s/".*//')
        echo "✅ Projeto: $NAME"

        VERSION=$(grep '"version"' package.json | sed 's/.*"version": "//;s/".*//')
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "❌ Versão inválida: $VERSION (deve ser semver major.minor.patch)"
          exit 1
        fi
        echo "✅ Versão: v$VERSION"

    # ── Setup ─────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Enable pnpm via corepack
      run: |
        corepack enable
        corepack prepare pnpm@10 --activate
        mkdir -p /tmp/pnpm-store
        pnpm config set store-dir /tmp/pnpm-store --global
        echo "PNPM_HOME=/tmp/pnpm-home" >> $GITHUB_ENV

    # ── Cache ──────────────────────────────────────────────────
    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: /tmp/pnpm-store
        key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-

    - name: Cache Playwright browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          playwright-

    # ── Dependencies ───────────────────────────────────────────
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Playwright browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    # ── Quality Gates ──────────────────────────────────────────
    - name: Astro type check
      continue-on-error: true
      run: pnpm astro check

    - name: Build Astro
      run: pnpm build
      # Astro build catches MDX syntax errors, broken imports, missing components

    - name: Start preview server
      run: |
        npx astro preview --port 4321 --host 127.0.0.1 &
        sleep 3
        for i in $(seq 1 10); do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4321/ 2>/dev/null || echo "000")
          if [ "$CODE" = "200" ]; then
            echo "✅ Preview server ready on :4321"
            break
          fi
          echo "Waiting for preview... ($i)"
          sleep 2
        done
        if [ "$CODE" != "200" ]; then
          echo "❌ Preview server didn't start"
          exit 1
        fi

    - name: Run E2E tests
      continue-on-error: true
      env:
        PLAYWRIGHT_TEST_URL: http://127.0.0.1:4321
      run: pnpm exec playwright test --config e2e/playwright.config.ts --reporter=list --workers=2 || true

    # ── Deploy ─────────────────────────────────────────────────
    - name: Deploy to Vercel (Production)
      if: github.ref_name == 'main' && github.event_name != 'pull_request'
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      run: |
        npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes

    # ── Health Check ──────────────────────────────────────────
    - name: Health Check
      if: github.ref_name == 'main' && github.event_name != 'pull_request'
      run: |
        sleep 15
        BASE="https://lifelog-sepia.vercel.app"
        FAIL=0

        # Homepage
        for i in $(seq 1 3); do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/" 2>/dev/null || echo "000")
          if [ "$CODE" = "200" ]; then
            echo "✅ / → $CODE"
            break
          fi
          echo "⚠️  / → $CODE (tentativa $i)"
          sleep 3
        done
        [ "$CODE" != "200" ] && echo "❌ / → $CODE (excedeu tentativas)" && FAIL=1

        # Sitemap
        CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/sitemap-index.xml" 2>/dev/null || echo "000")
        [ "$CODE" = "200" ] && echo "✅ /sitemap-index.xml → $CODE" || echo "ℹ️  /sitemap-index.xml → $CODE (não bloqueante)"

        # RSS
        CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/rss.xml" 2>/dev/null || echo "000")
        [ "$CODE" = "200" ] && echo "✅ /rss.xml → $CODE" || echo "ℹ️  /rss.xml → $CODE (não bloqueante)"

        # Páginas principais
        for page in "/sobre/" "/arquivo/"; do
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$page" 2>/dev/null || echo "000")
          [ "$CODE" = "200" ] && echo "✅ $page → $CODE" || echo "ℹ️  $page → $CODE (não bloqueante)"
        done

        # Post específico (verifica se os posts tão servindo)
        CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/post/tatuengine-primeiros-experimentos-com-wave-field-theory/" 2>/dev/null || echo "000")
        [ "$CODE" = "200" ] && echo "✅ /post/tatuengine → $CODE" || echo "ℹ️  /post/tatuengine → $CODE (não bloqueante)"

        [ "$FAIL" = "0" ] && echo "✅ All health checks passed" || exit 1

    # ── Notifications ──────────────────────────────────────────
    - name: Notify Telegram Success
      if: github.ref_name == 'main' && github.event_name != 'pull_request' && success()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ *LifeLog CI*%0A%0A📦 *Status:* Sucesso%0A🔗 *URL:* https://lifelog-sepia.vercel.app%0A📝 *Commit:* \`$(git rev-parse --short HEAD)\`" \
          -d "parse_mode=Markdown"

    - name: Notify Telegram Failure
      if: github.ref_name == 'main' && github.event_name != 'pull_request' && failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ *LifeLog CI Falhou*%0A%0A📝 *Commit:* \`$(git rev-parse --short HEAD)\`%0A🔍 *Log:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -d "parse_mode=Markdown"
